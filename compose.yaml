# =============================================================================
# Ops Command Center — full stack compose
# =============================================================================
# Production / single-VPS deploy:
#   cp .env.example .env  # then fill in AUTH_SECRET, AUTH_GOOGLE_*, etc.
#   docker compose up -d --build
#   docker compose exec web pnpm db:seed    # one-time, optional demo data
#
# Local dev (Postgres only, run apps via `pnpm dev` for hot reload):
#   docker compose up -d postgres
#   pnpm db:migrate && pnpm db:seed && pnpm dev
# =============================================================================

x-web-build: &web-build
  context: .
  dockerfile: apps/web/Dockerfile

services:
  # --- Postgres ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops}
      POSTGRES_DB: ${POSTGRES_DB:-ops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops} -d ${POSTGRES_DB:-ops}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- One-shot migrator (runs Drizzle migrations, then exits) -------------
  # Reuses the web image. Compose's `service_completed_successfully` gates
  # the long-running services until this exits 0.
  migrator:
    build: *web-build
    image: ops-command-center-web
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops}@postgres:5432/${POSTGRES_DB:-ops}
    command: ["pnpm", "db:migrate"]

  # --- Next.js web app (Auth.js, tRPC, dashboards, ingest, sync) -----------
  web:
    build: *web-build
    image: ops-command-center-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops}@postgres:5432/${POSTGRES_DB:-ops}
      # Auth.js v5
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET must be set — generate with openssl rand -base64 32}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      # Single-operator escape hatch — re-enables the dev credentials bypass
      # on production builds. ONLY safe behind a VPN / Tailscale / firewall.
      # Disable + configure OIDC before exposing publicly.
      ALLOW_DEV_BYPASS: "${ALLOW_DEV_BYPASS:-}"
      # Realtime — shared with the realtime worker
      REALTIME_JWT_SECRET: "${REALTIME_JWT_SECRET:?REALTIME_JWT_SECRET must be set}"
      NEXT_PUBLIC_REALTIME_URL: "${NEXT_PUBLIC_REALTIME_URL:-ws://localhost:4001}"
      # Internal sync — shared with the realtime worker
      SYNC_SECRET: "${SYNC_SECRET:?SYNC_SECRET must be set}"
      # Connector secrets — referenced from connection rows via env:NAME
      PROXMOX_TOKEN: ${PROXMOX_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # --- Realtime WS worker (pg-listen → WS hub + Proxmox sync tick) ---------
  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    image: ops-command-center-realtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops}@postgres:5432/${POSTGRES_DB:-ops}
      REALTIME_HOST: 0.0.0.0
      REALTIME_PORT: "4001"
      REALTIME_JWT_SECRET: "${REALTIME_JWT_SECRET:?REALTIME_JWT_SECRET must be set}"
      SYNC_SECRET: "${SYNC_SECRET:?SYNC_SECRET must be set}"
      # Optional — webhook deliveries are signed with HMAC-SHA256 over the
      # body and sent in the x-ops-signature header. Receivers verify with
      # the same secret. If unset, deliveries are sent unsigned.
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      # Eval execution credentials — when set, eval-tick calls the real
      # model APIs and scores responses against eval_cases.expected_pattern.
      # Unset both → deterministic mock provider (no API spend, full plumbing
      # still exercised). Set one or the other based on suite.model.
      EVAL_ANTHROPIC_KEY: "${EVAL_ANTHROPIC_KEY:-}"
      EVAL_OPENAI_KEY: "${EVAL_OPENAI_KEY:-}"
      # Service-DNS URL the realtime worker uses to call /api/sync/* on web.
      SYNC_WEB_URL: http://web:3000
    ports:
      - "${REALTIME_PORT:-4001}:4001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:4001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  ops-postgres-data:
    name: ops-postgres-data
